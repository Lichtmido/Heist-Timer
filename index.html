<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>受注時間計算機</title>
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .controls { margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 10px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; background: #333; color: white; border: none; }
        .tab-btn.active { background: #555; }
        table { width: 100%; border-collapse: collapse; display: none; margin-bottom: 20px; background: #222; }
        table.active { display: table; }
        th, td { padding: 10px; border: 1px solid #444; text-align: center; }
        .cat-row { background: #444; font-weight: bold; text-align: left; padding: 10px; }
        input[type="number"] { width: 60px; background: #444; color: white; border: 1px solid #666; padding: 5px; }
        button { cursor: pointer; padding: 5px 10px; }
        .reset-all { background: #d9534f; color: white; }
        .sort-btn { background: #4a90e2; color: white; }
        .sort-all-btn { background: #b33939; color: white; display: none; }
        .undo-btn { background: #777; color: white; }
        .set-btn { background: #5cb85c; color: white; }
        .reset-btn { background: #f0ad4e; color: white; }
        .webhook-area { margin-top: 20px; padding: 15px; border: 1px solid #444; background: #222; }
        input[type="text"] { width: 300px; background: #333; color: white; border: 1px solid #555; padding: 5px; }
        .copy-area { margin-top: 20px; }
        textarea { width: 100%; height: 150px; background: #111; color: #0f0; padding: 10px; font-family: monospace; border: 1px solid #444; }
    </style>
</head>
<body>

<h2>受注時間計算機</h2>
<div class="controls">
    <button class="reset-all" onclick="resetAll()">全リセット</button>
    <button class="sort-btn" onclick="sortTab()">タブ内ソート</button>
    <button id="sortAllBtn" class="sort-all-btn" onclick="sortAll()">全体時刻順ソート</button>
    <button class="undo-btn" onclick="undoSort()">ソート解除</button>
</div>

<div class="tabs">
    <button id="btn-all" class="tab-btn active" onclick="showTab('all')">全体(入力用)</button>
    <button id="btn-jun" class="tab-btn" onclick="showTab('jun')">準重強盗</button>
    <button id="btn-juu" class="tab-btn" onclick="showTab('juu')">重強盗</button>
</div>

<table id="table-all" class="active"><thead><tr><th>カテゴリ</th><th>ミッション名</th><th>何分後</th><th>受注可能時間</th><th>操作</th></tr></thead><tbody id="body-all"></tbody></table>
<table id="table-jun"><thead><tr><th>ミッション名</th><th>受注可能時間</th></tr></thead><tbody id="body-jun"></tbody></table>
<table id="table-juu"><thead><tr><th>ミッション名</th><th>受注可能時間</th></tr></thead><tbody id="body-juu"></tbody></table>

<h2>WebHookURL</h2>
<div class="webhook-area">
    <input type="text" id="webhookUrl" placeholder="Discord WebHook URL">
    <button onclick="saveWebhook()">保存</button>
    <button onclick="sendToDiscord()">送信</button>
</div>

<div class="copy-area">
    <h3>コピペ用リスト</h3>
    <textarea id="copyText" readonly></textarea>
</div>

<script>
    const initialData = [
        { name: "パレト銀行", cat: "jun" }, { name: "輸送機", cat: "jun" },
        { name: "ボブキャット", cat: "jun" }, { name: "ナイトクラブ", cat: "jun" },
        { name: "軍事基地", cat: "jun" }, { name: "飛行場", cat: "juu" },
        { name: "オイルリグ", cat: "juu" }, { name: "客船", cat: "juu" },
        { name: "ヒューメイン", cat: "juu" }, { name: "アーティファクト", cat: "juu" },
        { name: "ユニオン", cat: "juu" }, { name: "パシフィック銀行", cat: "juu" }
    ];

    let heists = initialData.map((h, i) => ({ ...h, id: i, time: null, dateObj: null }));
    let currentTab = 'all';
    let sortMode = { all: 'none', jun: 'none', juu: 'none' }; 

    window.onload = () => {
        document.getElementById('webhookUrl').value = localStorage.getItem('whUrl') || '';
        render();
    };

    function saveWebhook() { localStorage.setItem('whUrl', document.getElementById('webhookUrl').value); alert('保存しました'); }

    function render() {
        document.getElementById('sortAllBtn').style.display = (currentTab === 'all') ? 'inline-block' : 'none';

        ['all', 'jun', 'juu'].forEach(cat => {
            const body = document.getElementById('body-' + cat);
            body.innerHTML = '';
            
            let list = [...heists];
            if (sortMode[cat] !== 'none') list.sort((a,b) => (!a.dateObj ? 1 : !b.dateObj ? -1 : a.dateObj - b.dateObj));

            if (cat === 'all') {
                if (sortMode[cat] === 'global') {
                    list.forEach(h => appendFullRow(body, h, true));
                } else {
                    ['jun', 'juu'].forEach(c => {
                        body.innerHTML += `<tr><td colspan="5" class="cat-row">${c === 'jun' ? '■ 準重強盗' : '■ 重強盗'}</td></tr>`;
                        list.filter(h => h.cat === c).forEach(h => appendFullRow(body, h, true));
                    });
                }
            } else {
                list.filter(h => h.cat === cat).forEach(h => {
                    body.innerHTML += `<tr><td>${h.name}</td><td>${h.time || '--:--'}</td></tr>`;
                });
            }
        });
        updateCopyText();
    }

    function appendFullRow(body, h, showCat) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            ${showCat ? `<td>${h.cat === 'jun' ? '準' : '重'}</td>` : ''}
            <td>${h.name}</td>
            <td><input type="number" id="input-${h.id}" placeholder="分"></td>
            <td>${h.time || '--:--'}</td>
            <td><button class="set-btn" onclick="setTime(${h.id})">セット</button> <button class="reset-btn" onclick="resetRow(${h.id})">×</button></td>
        `;
        body.appendChild(tr);
    }

    function setTime(id) {
        const input = document.getElementById(`input-${id}`);
        const minutes = parseInt(input.value);
        if (!isNaN(minutes)) {
            const d = new Date();
            d.setMinutes(d.getMinutes() + minutes);
            const target = heists.find(h => h.id === id);
            target.dateObj = d;
            target.time = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
            render(); 
        }
    }

    function resetRow(id) { 
        const target = heists.find(h => h.id === id);
        target.time = null; target.dateObj = null; render(); 
    }
    function resetAll() { heists = initialData.map((h, i) => ({ ...h, id: i, time: null, dateObj: null })); sortMode = { all: 'none', jun: 'none', juu: 'none' }; render(); }
    function showTab(cat) { currentTab = cat; document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-' + cat)); document.querySelectorAll('table').forEach(t => t.classList.toggle('active', t.id === 'table-' + cat)); render(); }
    function sortTab() { sortMode[currentTab] = 'tab'; render(); }
    function sortAll() { sortMode[currentTab] = 'global'; render(); }
    function undoSort() { sortMode[currentTab] = 'none'; render(); }

    function updateCopyText() {
        let content = "";
        let list = (sortMode[currentTab] !== 'none') ? [...heists].sort((a,b) => (!a.dateObj ? 1 : !b.dateObj ? -1 : a.dateObj - b.dateObj)) : heists;
        const cats = currentTab === 'all' ? ['jun', 'juu'] : [currentTab];
        cats.forEach(c => {
            const filtered = list.filter(h => h.cat === c && h.time);
            if(filtered.length > 0) {
                if(sortMode[currentTab] !== 'global') content += (c === 'jun' ? "■準重強盗\n" : "■重強盗\n");
                filtered.forEach(h => content += `・${h.name} ${h.time.replace(':', '時')}分\n`);
                if(sortMode[currentTab] !== 'global') content += "\n";
            }
        });
        document.getElementById('copyText').value = content.trim() || '時間未設定';
    }

    async function sendToDiscord() {
        const url = localStorage.getItem('whUrl');
        if (!url) return alert('URLを入力してください');
        const content = "**【強盗ミッション受注可能時間】**\n```bash\n" + document.getElementById('copyText').value + "```";
        try {
            await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content: content}) });
            alert('送信しました');
        } catch (e) { alert('送信失敗'); }
    }
</script>
</body>
</html>
